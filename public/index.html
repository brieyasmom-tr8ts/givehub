<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GiveHub — Fundraising hubs for nonprofits</title>
  <meta name="description" content="GiveHub lets nonprofits curate and promote multiple GiveSendGo campaigns on one branded landing page." />
  <link rel="stylesheet" href="/themes.css" />
</head>
<body>
  <div id="root"></div>

  <script>
    const API = location.hostname === 'localhost'
      ? 'http://localhost:8787'
      : 'https://givehub.brieyasmom.workers.dev';

    const path = location.pathname.replace(/\/$/, '');
    const slug = path.split('/').filter(Boolean)[0];

    function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function money(cents) { return '$' + ((cents || 0) / 100).toLocaleString('en-US', { maximumFractionDigits: 0 }); }
    function abbrev(cents) {
      const n = (cents || 0) / 100;
      if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1000) return '$' + (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
    }
    function pct(raised, goal) { return goal ? Math.min(100, Math.round((raised / goal) * 100)) : 0; }

    /* ========== Marketing View ========== */
    function renderMarketing() {
      document.getElementById('root').innerHTML = `
        <nav class="marketing">
          <div class="logo">Give<span>Hub</span></div>
          <div class="links">
            <a href="#features">Features</a>
            <a href="#how">How it works</a>
            <a href="/admin.html">Log in</a>
            <a href="/admin.html" class="btn">Get started</a>
          </div>
        </nav>

        <div class="hero">
          <div class="hero-inner">
            <div class="badge">Powered by GiveSendGo</div>
            <h1>Turn your nonprofit into a <span class="accent">fundraising hub</span></h1>
            <p class="sub">Curate multiple GiveSendGo campaigns on one beautiful, branded landing page. Track donations, measure impact, grow your reach — no code required.</p>
            <div class="cta-row">
              <a href="/admin.html" class="btn lg">Create your hub — free</a>
              <a href="#how" class="btn lg ghost">See how it works</a>
            </div>
            <p class="micro">Free forever · No credit card required · Set up in minutes</p>
          </div>
        </div>

        <section id="features">
          <div class="container">
            <div class="eyebrow">Features</div>
            <h2>Everything your nonprofit needs</h2>
            <p class="section-sub">A complete fundraising hub that works alongside your GiveSendGo campaigns.</p>
            <div class="features">
              <div class="feature"><div class="feature-icon">🎨</div><h3>Pro themes</h3><p>Choose from four beautiful, professionally designed themes. Customize colors and branding to match your mission.</p></div>
              <div class="feature"><div class="feature-icon">💝</div><h3>Multi-campaign management</h3><p>Pull in and organize all your GiveSendGo campaigns. Feature the ones that matter most.</p></div>
              <div class="feature"><div class="feature-icon">📊</div><h3>Unified analytics</h3><p>See total raised across every campaign, track traffic sources, understand what drives donations.</p></div>
              <div class="feature"><div class="feature-icon">🔗</div><h3>Donations flow to GSG</h3><p>Every donation goes directly to your GiveSendGo campaigns. We never touch the money.</p></div>
              <div class="feature"><div class="feature-icon">⚡</div><h3>No-code builder</h3><p>Set up your hub in minutes with a simple visual editor. No developers, no headaches.</p></div>
              <div class="feature"><div class="feature-icon">🌐</div><h3>Custom domain ready</h3><p>Launch on a free GiveHub URL or connect your own domain when you're ready to go pro.</p></div>
            </div>
          </div>
        </section>

        <section id="how" class="how">
          <div class="container">
            <div class="eyebrow">How it works</div>
            <h2>Launch in three steps</h2>
            <p class="section-sub">From signup to live hub in under 10 minutes.</p>
            <div class="steps">
              <div class="step"><div class="step-num">1</div><h4>Create your hub</h4><p>Sign up free and claim your URL. Add your logo, pick your colors, choose a theme.</p></div>
              <div class="step"><div class="step-num">2</div><h4>Import campaigns</h4><p>Paste in any GiveSendGo campaign ID. Organize them into categories.</p></div>
              <div class="step"><div class="step-num">3</div><h4>Share & grow</h4><p>Share your hub link everywhere. Watch donations flow and track every click.</p></div>
            </div>
          </div>
        </section>

        <div class="cta-section">
          <h2>Ready to raise more?</h2>
          <p>Create your free fundraising hub today. No credit card required.</p>
          <a href="/admin.html" class="btn lg">Get started — it's free</a>
        </div>

        <footer class="marketing">
          <div><a href="/admin.html">Log in</a><a href="#features">Features</a><a href="#how">How it works</a></div>
          <p style="margin-top:20px;">© 2026 GiveHub · A GiveSendGo product</p>
        </footer>`;
    }

    /* ========== Hub View ========== */

    function cardHtml(c) {
      const p = pct(c.raised_amount, c.goal_amount);
      return `
        <article class="gh-card">
          <div class="gh-card-media">
            ${c.image_url ? `<img src="${esc(c.image_url)}" alt="${esc(c.title)}">` : `<img src="" alt="">`}
            ${c.is_featured ? '<span class="gh-card-badge">Featured</span>' : ''}
          </div>
          <div class="gh-card-body">
            <h4 class="gh-card-title">${esc(c.title)}</h4>
            <p class="gh-card-desc">${esc((c.description || '').slice(0, 200))}</p>
            <div class="gh-bar"><div class="gh-bar-fill" style="width:${p}%"></div></div>
            <div class="gh-card-meta">
              <span><span class="gh-card-raised">${money(c.raised_amount)}</span> <span class="gh-card-goal">of ${money(c.goal_amount)}</span></span>
              <span class="gh-card-donors">${(c.donor_count || 0).toLocaleString()} donors</span>
            </div>
            <a class="gh-card-cta" href="${API}/r/${esc(slug)}/${esc(c.id)}">Donate</a>
          </div>
        </article>`;
    }

    function impactHtml(campaigns) {
      const raised = campaigns.reduce((s, c) => s + (c.raised_amount || 0), 0);
      const donors = campaigns.reduce((s, c) => s + (c.donor_count || 0), 0);
      const count = campaigns.length;
      return `
        <div class="gh-impact">
          <div class="gh-impact-stat"><div class="gh-impact-n">${abbrev(raised)}</div><div class="gh-impact-l">Raised</div></div>
          <div class="gh-impact-stat"><div class="gh-impact-n">${donors.toLocaleString()}</div><div class="gh-impact-l">Donors</div></div>
          <div class="gh-impact-stat"><div class="gh-impact-n">${count}</div><div class="gh-impact-l">Campaigns</div></div>
        </div>`;
    }

    function aboutHtml(hub) {
      if (!hub.about_html) return '';
      return `
        <div class="gh-about">
          <h3>About</h3>
          <div class="gh-about-content">${hub.about_html}</div>
        </div>`;
    }

    function headerHtml(org, hub) {
      return `
        <header class="gh-header">
          ${hub.logo_url ? `<img src="${esc(hub.logo_url)}" alt="${esc(org.name)}">` : ''}
          <h1>${esc(org.name)}</h1>
          <div class="gh-header-right">
            <button class="gh-share-btn" onclick="copyLink()">Copy link</button>
          </div>
        </header>`;
    }

    function heroHtml(hub, themeName) {
      const hasImage = !!hub.hero_image_url;
      return `
        <div class="gh-hero ${hasImage ? 'has-image' : ''}">
          ${hasImage ? `<div class="gh-hero-bg" style="background-image:url('${esc(hub.hero_image_url)}')"></div>` : ''}
          <div class="gh-hero-content">
            <h2>${esc(hub.headline || '')}</h2>
            ${hub.tagline ? `<p>${esc(hub.tagline)}</p>` : ''}
          </div>
        </div>`;
    }

    function campaignSections(campaigns) {
      const featured = campaigns.filter(c => c.is_featured);
      const rest = campaigns.filter(c => !c.is_featured);
      let html = '';
      if (featured.length) {
        html += `<h3 class="gh-section-title">Featured Campaigns</h3><div class="gh-grid">${featured.map(cardHtml).join('')}</div>`;
      }
      if (rest.length) {
        html += `<h3 class="gh-section-title">${featured.length ? 'All Campaigns' : 'Campaigns'}</h3><div class="gh-grid">${rest.map(cardHtml).join('')}</div>`;
      }
      if (!campaigns.length) {
        html += '<p class="gh-loading">No campaigns yet.</p>';
      }
      return html;
    }

    function renderClassic(data) {
      const { org, hub, campaigns } = data;
      return `
        ${headerHtml(org, hub)}
        ${heroHtml(hub, 'classic')}
        ${impactHtml(campaigns)}
        <main class="gh-main">
          ${campaignSections(campaigns)}
          ${aboutHtml(hub)}
        </main>
        <footer class="hub">Powered by <a href="/" style="color:inherit;text-decoration:underline">GiveHub</a></footer>`;
    }

    function renderMagazine(data) {
      const { org, hub, campaigns } = data;
      const feat = campaigns.find(c => c.is_featured) || campaigns[0];
      const rest = campaigns.filter(c => c !== feat);
      const heroImg = hub.hero_image_url || (feat && feat.image_url) || '';
      return `
        ${headerHtml(org, hub)}
        <div class="gh-hero">
          <div class="gh-hero-split">
            <div class="gh-hero-split-img" style="background-image:url('${esc(heroImg)}')"></div>
            <div class="gh-hero-split-text">
              <div class="gh-eyebrow">${feat ? 'Featured Campaign' : esc(org.name)}</div>
              <h2>${esc(feat ? feat.title : (hub.headline || org.name))}</h2>
              <p>${esc(feat ? (feat.description || '').slice(0, 200) : (hub.tagline || ''))}</p>
              ${feat ? `<a class="btn" href="${API}/r/${esc(slug)}/${esc(feat.id)}">Donate Now</a>` : ''}
            </div>
          </div>
        </div>
        ${impactHtml(campaigns)}
        <main class="gh-main">
          ${rest.length ? `<h3 class="gh-section-title">More Campaigns</h3><div class="gh-grid">${rest.map(cardHtml).join('')}</div>` : ''}
          ${!rest.length && !feat ? '<p class="gh-loading">No campaigns yet.</p>' : ''}
          ${aboutHtml(hub)}
        </main>
        <footer class="hub">Powered by <a href="/" style="color:inherit;text-decoration:underline">GiveHub</a></footer>`;
    }

    function renderBold(data) {
      const { org, hub, campaigns } = data;
      return `
        ${headerHtml(org, hub)}
        <div class="gh-hero ${hub.hero_image_url ? 'has-image' : ''}">
          ${hub.hero_image_url ? `<div class="gh-hero-bg" style="background-image:url('${esc(hub.hero_image_url)}')"></div>` : ''}
          <div class="gh-hero-content">
            <h2>${esc(hub.headline || org.name)}</h2>
            ${hub.tagline ? `<p>${esc(hub.tagline)}</p>` : ''}
          </div>
        </div>
        ${impactHtml(campaigns)}
        <main class="gh-main">
          ${campaigns.length ? `<h3 class="gh-section-title">Our Campaigns</h3><div class="gh-grid">${campaigns.map(cardHtml).join('')}</div>` : '<p class="gh-loading">No campaigns yet.</p>'}
          ${aboutHtml(hub)}
        </main>
        <footer class="hub">Powered by <a href="/" style="color:inherit;text-decoration:underline">GiveHub</a></footer>`;
    }

    function renderMinimal(data) {
      const { org, hub, campaigns } = data;
      return `
        ${headerHtml(org, hub)}
        <div class="gh-hero">
          <div class="gh-hero-content">
            <h2>${esc(hub.headline || org.name)}</h2>
            ${hub.tagline ? `<p>${esc(hub.tagline)}</p>` : ''}
          </div>
        </div>
        ${impactHtml(campaigns)}
        <main class="gh-main">
          ${campaigns.length ? `<h3 class="gh-section-title">Campaigns</h3><div class="gh-grid">${campaigns.map(cardHtml).join('')}</div>` : '<p class="gh-loading">No campaigns yet.</p>'}
          ${aboutHtml(hub)}
        </main>
        <footer class="hub">Powered by <a href="/" style="color:inherit;text-decoration:underline">GiveHub</a></footer>`;
    }

    const THEMES = { classic: renderClassic, magazine: renderMagazine, bold: renderBold, minimal: renderMinimal };

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.querySelector('.gh-share-btn');
        if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy link', 2000); }
      });
    }

    async function renderHub() {
      document.getElementById('root').innerHTML = '<p class="gh-loading">Loading…</p>';
      try {
        const r = await fetch(`${API}/api/hub/${encodeURIComponent(slug)}`);
        if (!r.ok) throw new Error('not found');
        const data = await r.json();
        const hub = data.hub || {};
        const themeName = (hub.theme || 'classic').toLowerCase();
        const render = THEMES[themeName] || THEMES.classic;

        // Apply hub colors as CSS custom properties
        document.documentElement.style.setProperty('--primary', hub.primary_color || '#1a73e8');
        document.documentElement.style.setProperty('--secondary', hub.secondary_color || '#34a853');
        document.title = data.org.name + ' — GiveHub';

        document.getElementById('root').innerHTML = `<div class="hub" data-theme="${esc(themeName)}">${render(data)}</div>`;

        // Track view
        fetch(`${API}/api/hub/${encodeURIComponent(slug)}/track`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_type: 'view',
            referrer_url: document.referrer,
            session_id: crypto.randomUUID(),
          }),
        }).catch(() => {});
      } catch (e) {
        document.getElementById('root').innerHTML = `
          <div class="gh-error">
            <h1>Hub not found</h1>
            <p>No organization exists at <code>/${esc(slug)}</code>.</p>
            <a href="/" class="btn">Go home</a>
            <a href="/admin.html" class="btn ghost" style="margin-left:8px;">Create a hub</a>
          </div>`;
      }
    }

    /* ========== Router ========== */
    if (!slug) {
      renderMarketing();
    } else {
      renderHub();
    }
  </script>
</body>
</html>
