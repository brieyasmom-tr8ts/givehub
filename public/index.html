<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GiveHub — Fundraising hubs for nonprofits</title>
  <meta name="description" content="GiveHub lets nonprofits curate and promote multiple GiveSendGo campaigns on one branded landing page." />
  <style>
    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --secondary: #34a853;
      --text: #0f172a;
      --muted: #64748b;
      --bg: #ffffff;
      --bg-soft: #f8fafc;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---------- Shared ---------- */
    .btn {
      display: inline-block;
      padding: 12px 22px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      border: 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--primary-dark); color: #fff; text-decoration: none; }
    .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn.ghost:hover { background: var(--bg-soft); color: var(--text); }
    .btn.lg { padding: 16px 32px; font-size: 17px; }

    /* ---------- Marketing view ---------- */
    nav.marketing {
      position: sticky; top: 0; z-index: 10;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 20px; font-weight: 700; color: var(--text); }
    .logo span { color: var(--primary); }
    nav.marketing .links { display: flex; gap: 24px; align-items: center; }
    nav.marketing .links a { color: var(--muted); font-size: 14px; font-weight: 500; }
    nav.marketing .links a:hover { color: var(--text); text-decoration: none; }

    .hero { padding: 100px 32px 80px; text-align: center; background: linear-gradient(180deg, #fff 0%, var(--bg-soft) 100%); }
    .hero-inner { max-width: 820px; margin: 0 auto; }
    .badge { display: inline-block; background: #e0edff; color: var(--primary-dark); padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
    .hero h1 { font-size: 56px; line-height: 1.1; font-weight: 800; margin: 0 0 24px; letter-spacing: -0.02em; }
    .accent { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p.sub { font-size: 20px; color: var(--muted); margin: 0 0 40px; }
    .cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .micro { margin-top: 24px; font-size: 13px; color: var(--muted); }

    section { padding: 80px 32px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .eyebrow { text-transform: uppercase; font-size: 13px; font-weight: 700; color: var(--primary); letter-spacing: 0.08em; text-align: center; margin-bottom: 12px; }
    h2 { font-size: 38px; font-weight: 700; text-align: center; margin: 0 0 16px; letter-spacing: -0.01em; }
    .section-sub { text-align: center; color: var(--muted); font-size: 18px; max-width: 640px; margin: 0 auto 56px; }

    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
    .feature { background: var(--bg-soft); padding: 32px; border-radius: 14px; border: 1px solid var(--border); }
    .feature-icon { width: 48px; height: 48px; background: #e0edff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 20px; }
    .feature h3 { font-size: 19px; margin: 0 0 10px; font-weight: 700; }
    .feature p { color: var(--muted); font-size: 15px; margin: 0; }

    .how { background: var(--bg-soft); }
    .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
    .step { text-align: center; padding: 24px; }
    .step-num { width: 44px; height: 44px; background: var(--primary); color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; margin-bottom: 16px; }
    .step h4 { font-size: 18px; margin: 0 0 8px; font-weight: 700; }
    .step p { color: var(--muted); font-size: 14px; margin: 0; }

    .cta-section { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; text-align: center; padding: 80px 32px; }
    .cta-section h2 { color: #fff; }
    .cta-section p { color: rgba(255,255,255,0.9); font-size: 18px; margin: 0 0 32px; }
    .cta-section .btn { background: #fff; color: var(--primary); }
    .cta-section .btn:hover { background: #f1f5f9; color: var(--primary-dark); }

    footer.marketing { padding: 48px 32px 32px; text-align: center; color: var(--muted); font-size: 14px; border-top: 1px solid var(--border); }
    footer.marketing a { color: var(--muted); margin: 0 12px; }

    @media (max-width: 720px) {
      .hero { padding: 60px 20px 50px; }
      .hero h1 { font-size: 38px; }
      .hero p.sub { font-size: 17px; }
      h2 { font-size: 28px; }
      .features, .steps { grid-template-columns: 1fr; }
      section { padding: 56px 20px; }
      nav.marketing { padding: 14px 20px; }
      nav.marketing .links a:not(.btn) { display: none; }
    }

    /* ---------- Hub view ---------- */
    .hub-header { background: #fff; padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .hub-header img { height: 36px; }
    .hub-header h1 { font-size: 18px; margin: 0; }
    .hub-hero { padding: 64px 24px; text-align: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
    .hub-hero h2 { font-size: 40px; margin: 0 0 12px; color: #fff; text-align: center; }
    .hub-hero p { font-size: 18px; opacity: 0.9; }
    .hub-main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .hub-main h3 { font-size: 22px; margin: 32px 0 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; flex-direction: column; }
    .card img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .card h4 { margin: 0 0 8px; font-size: 16px; }
    .card p { font-size: 13px; color: var(--muted); flex: 1; }
    .bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 12px 0 8px; }
    .bar > div { height: 100%; background: var(--primary); }
    .stats-row { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 12px; }
    .card .btn { text-align: center; }
    .loading { text-align: center; padding: 60px; color: var(--muted); }
    footer.hub { text-align: center; padding: 32px; color: #9ca3af; font-size: 13px; }

    /* Fundraiser card chip */
    .fr-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 16px; }
    .fr-card .who { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .fr-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
    .fr-card .name { font-weight: 600; font-size: 14px; }
    .fr-card .sub { font-size: 12px; color: var(--muted); }
    .fr-card p.story { font-size: 13px; color: var(--muted); margin: 0 0 10px; }

    /* Fundraiser detail + create */
    .fr-detail { max-width: 760px; margin: 0 auto; padding: 32px 24px; }
    .fr-detail .hero-img { width: 100%; max-height: 360px; object-fit: cover; border-radius: 14px; margin-bottom: 24px; background: #eee; }
    .fr-detail h1 { font-size: 32px; margin: 0 0 6px; letter-spacing: -0.01em; }
    .fr-detail .byline { color: var(--muted); margin: 0 0 24px; font-size: 15px; }
    .fr-detail .story { font-size: 16px; line-height: 1.7; white-space: pre-wrap; }
    .fr-detail .panel { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin: 24px 0; }
    .fr-detail .big-raised { font-size: 32px; font-weight: 700; }
    .fr-detail .big-goal { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .fr-detail .bar { margin: 0 0 12px; }
    .fr-detail .row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); }
    .fr-detail .btn.block { display: block; width: 100%; text-align: center; margin-top: 16px; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal { background: #fff; border-radius: 14px; padding: 28px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin: 0 0 6px; font-size: 22px; }
    .modal .muted { color: var(--muted); font-size: 14px; margin: 0 0 18px; }
    .modal label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    .modal input, .modal textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; }
    .modal .actions { display: flex; gap: 8px; margin-top: 20px; }
    .modal .actions button { flex: 1; padding: 12px; border: 0; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .modal .actions .primary { background: var(--primary); color: #fff; }
    .modal .actions .cancel { background: var(--bg-soft); color: var(--text); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const API = location.hostname === 'localhost'
      ? 'http://localhost:8787'
      : 'https://givehub.brieyasmom.workers.dev';

    const path = location.pathname.replace(/\/$/, '');
    const parts = path.split('/').filter(Boolean);
    const slug = parts[0];
    // /:slug/f/:fundraiserSlug
    const fundraiserSlug = parts[1] === 'f' && parts[2] ? parts[2] : null;

    function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
    function money(cents) { return '$' + ((cents || 0) / 100).toLocaleString('en-US', { maximumFractionDigits: 0 }); }

    /* ---------- Marketing view ---------- */
    function renderMarketing() {
      document.getElementById('root').innerHTML = `
        <nav class="marketing">
          <div class="logo">Give<span>Hub</span></div>
          <div class="links">
            <a href="#features">Features</a>
            <a href="#how">How it works</a>
            <a href="/admin.html">Log in</a>
            <a href="/admin.html" class="btn">Get started</a>
          </div>
        </nav>

        <div class="hero">
          <div class="hero-inner">
            <div class="badge">🚀 Built on GiveSendGo</div>
            <h1>Turn your nonprofit into a <span class="accent">fundraising hub</span></h1>
            <p class="sub">Curate multiple GiveSendGo campaigns on one beautiful, branded landing page. Track donations, measure impact, grow your reach — no code required.</p>
            <div class="cta-row">
              <a href="/admin.html" class="btn lg">Create your hub — free</a>
              <a href="#how" class="btn lg ghost">See how it works</a>
            </div>
            <p class="micro">Free forever · No credit card required · Set up in minutes</p>
          </div>
        </div>

        <section id="features">
          <div class="container">
            <div class="eyebrow">Features</div>
            <h2>Everything your nonprofit needs</h2>
            <p class="section-sub">A complete fundraising hub that works alongside your GiveSendGo campaigns.</p>
            <div class="features">
              <div class="feature"><div class="feature-icon">🎨</div><h3>Branded landing page</h3><p>Customize your logo, colors, and messaging. Every hub looks like it was built just for you.</p></div>
              <div class="feature"><div class="feature-icon">💝</div><h3>Multi-campaign management</h3><p>Pull in and organize all your GiveSendGo campaigns. Feature the ones that matter most.</p></div>
              <div class="feature"><div class="feature-icon">📊</div><h3>Unified analytics</h3><p>See total raised across every campaign, track traffic sources, understand what drives donations.</p></div>
              <div class="feature"><div class="feature-icon">🔗</div><h3>Donations flow to GSG</h3><p>Every donation goes directly to your GiveSendGo campaigns. We never touch the money.</p></div>
              <div class="feature"><div class="feature-icon">⚡</div><h3>No-code builder</h3><p>Set up your hub in minutes with a simple visual editor. No developers, no headaches.</p></div>
              <div class="feature"><div class="feature-icon">🌐</div><h3>Custom domain ready</h3><p>Launch on a free GiveHub URL or connect your own domain when you're ready to go pro.</p></div>
            </div>
          </div>
        </section>

        <section id="how" class="how">
          <div class="container">
            <div class="eyebrow">How it works</div>
            <h2>Launch in three steps</h2>
            <p class="section-sub">From signup to live hub in under 10 minutes.</p>
            <div class="steps">
              <div class="step"><div class="step-num">1</div><h4>Create your hub</h4><p>Sign up free and claim your URL. Add your logo, pick your colors.</p></div>
              <div class="step"><div class="step-num">2</div><h4>Import campaigns</h4><p>Paste in any GiveSendGo campaign ID. Organize them into categories.</p></div>
              <div class="step"><div class="step-num">3</div><h4>Share & grow</h4><p>Share your hub link everywhere. Watch donations flow and track every click.</p></div>
            </div>
          </div>
        </section>

        <div class="cta-section">
          <h2>Ready to raise more?</h2>
          <p>Create your free fundraising hub today. No credit card required.</p>
          <a href="/admin.html" class="btn lg">Get started — it's free</a>
        </div>

        <footer class="marketing">
          <div><a href="/admin.html">Log in</a><a href="#features">Features</a><a href="#how">How it works</a></div>
          <p style="margin-top: 20px;">© 2026 GiveHub · Built on GiveSendGo</p>
        </footer>`;
    }

    /* ---------- Hub view ---------- */
    function card(c) {
      const pct = c.goal_amount ? Math.min(100, Math.round((c.raised_amount / c.goal_amount) * 100)) : 0;
      const p2p = c.allow_p2p
        ? `<button class="btn ghost" style="margin-top:8px;" onclick="openStartFundraiser('${esc(c.id)}', '${esc(c.title)}')">Start a fundraiser</button>`
        : '';
      return `
        <div class="card">
          ${c.image_url ? `<img src="${esc(c.image_url)}" alt="">` : `<img alt="">`}
          <div class="card-body">
            <h4>${esc(c.title)}</h4>
            <p>${esc((c.description || '').slice(0, 120))}</p>
            <div class="bar"><div style="width:${pct}%"></div></div>
            <div class="stats-row"><span>${money(c.raised_amount)}</span><span>${pct}%</span></div>
            <a class="btn" href="${API}/r/${esc(slug)}/${esc(c.id)}">Donate</a>
            ${p2p}
          </div>
        </div>`;
    }

    function frChip(f) {
      const pct = f.goal_amount ? Math.min(100, Math.round((f.raised_amount / f.goal_amount) * 100)) : 0;
      const initial = (f.supporter_name || '?').trim()[0].toUpperCase();
      return `
        <a class="fr-card" href="/${esc(slug)}/f/${esc(f.slug)}" style="text-decoration:none;color:inherit;display:block;">
          <div class="who">
            <div class="fr-avatar">${esc(initial)}</div>
            <div>
              <div class="name">${esc(f.supporter_name)}</div>
              <div class="sub">${money(f.raised_amount)} raised</div>
            </div>
          </div>
          ${f.story ? `<p class="story">${esc(f.story.slice(0, 100))}</p>` : ''}
          ${f.goal_amount ? `<div class="bar"><div style="width:${pct}%"></div></div>` : ''}
        </a>`;
    }

    // Hub-scoped state used by the P2P create modal
    let activeHub = null;

    async function renderHub() {
      document.getElementById('root').innerHTML = '<p class="loading">Loading…</p>';
      try {
        const r = await fetch(`${API}/api/hub/${encodeURIComponent(slug)}`);
        if (!r.ok) throw new Error('not found');
        const data = await r.json();
        activeHub = data;
        const hub = data.hub || {};
        document.documentElement.style.setProperty('--primary', hub.primary_color || '#1a73e8');
        document.documentElement.style.setProperty('--secondary', hub.secondary_color || '#34a853');
        document.title = data.org.name + ' — GiveHub';

        const featured = data.campaigns.filter(c => c.is_featured);
        const rest = data.campaigns.filter(c => !c.is_featured);
        const frs = data.fundraisers || [];

        document.getElementById('root').innerHTML = `
          <header class="hub-header">
            ${hub.logo_url ? `<img src="${esc(hub.logo_url)}" alt="">` : ''}
            <h1>${esc(data.org.name)}</h1>
          </header>
          <div class="hub-hero">
            <h2>${esc(hub.headline || data.org.name)}</h2>
            <p>${esc(hub.tagline || '')}</p>
          </div>
          <main class="hub-main">
            ${featured.length ? `<section><h3>⭐ Featured</h3><div class="grid">${featured.map(card).join('')}</div></section>` : ''}
            ${rest.length ? `<section><h3>All Campaigns</h3><div class="grid">${rest.map(card).join('')}</div></section>` : ''}
            ${!data.campaigns.length ? '<p class="loading">No campaigns yet.</p>' : ''}
            ${frs.length ? `<section><h3>🙌 Community Fundraisers</h3><div class="grid">${frs.map(frChip).join('')}</div></section>` : ''}
          </main>
          <footer class="hub">Powered by GiveHub</footer>`;

        fetch(`${API}/api/hub/${encodeURIComponent(slug)}/track`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_type: 'view',
            referrer_url: document.referrer,
            session_id: crypto.randomUUID(),
          }),
        }).catch(() => {});
      } catch (e) {
        document.getElementById('root').innerHTML = `
          <div style="max-width:560px;margin:100px auto;text-align:center;padding:24px;">
            <h1 style="font-size:32px;margin:0 0 12px;">Hub not found</h1>
            <p style="color:var(--muted);margin:0 0 24px;">No organization exists at <code>/${esc(slug)}</code>.</p>
            <a href="/" class="btn">Go home</a>
            <a href="/admin.html" class="btn ghost" style="margin-left:8px;">Create a hub</a>
          </div>`;
      }
    }

    /* ---------- Fundraiser detail view ---------- */
    async function renderFundraiser() {
      document.getElementById('root').innerHTML = '<p class="loading">Loading…</p>';
      try {
        const r = await fetch(`${API}/api/hub/${encodeURIComponent(slug)}/f/${encodeURIComponent(fundraiserSlug)}`);
        if (!r.ok) throw new Error('not found');
        const data = await r.json();
        const f = data.fundraiser;
        const c = data.campaign || {};
        const hub = data.hub || {};
        document.documentElement.style.setProperty('--primary', hub.primary_color || '#1a73e8');
        document.documentElement.style.setProperty('--secondary', hub.secondary_color || '#34a853');
        document.title = f.supporter_name + ' — ' + data.org.name;

        const pct = f.goal_amount ? Math.min(100, Math.round((f.raised_amount / f.goal_amount) * 100)) : 0;
        const img = f.image_url || c.image_url;

        document.getElementById('root').innerHTML = `
          <header class="hub-header">
            ${hub.logo_url ? `<img src="${esc(hub.logo_url)}" alt="">` : ''}
            <h1><a href="/${esc(slug)}" style="color:inherit;text-decoration:none;">${esc(data.org.name)}</a></h1>
          </header>
          <div class="fr-detail">
            ${img ? `<img class="hero-img" src="${esc(img)}" alt="">` : ''}
            <h1>${esc(f.supporter_name)} is fundraising</h1>
            <p class="byline">for <strong>${esc(c.title || '—')}</strong></p>
            <div class="panel">
              <div class="big-raised">${money(f.raised_amount)}</div>
              <div class="big-goal">${f.goal_amount ? `raised of ${money(f.goal_amount)} goal` : 'raised so far'}</div>
              ${f.goal_amount ? `<div class="bar"><div style="width:${pct}%"></div></div>` : ''}
              <div class="row"><span>${f.donor_count || 0} donors</span>${f.goal_amount ? `<span>${pct}%</span>` : ''}</div>
              <a class="btn block" href="${API}/r/${esc(slug)}/f/${esc(f.slug)}">Donate</a>
            </div>
            ${f.story ? `<h3 style="margin:24px 0 8px;">Story</h3><div class="story">${esc(f.story)}</div>` : ''}
          </div>
          <footer class="hub">Powered by GiveHub</footer>`;
      } catch (e) {
        document.getElementById('root').innerHTML = `
          <div style="max-width:560px;margin:100px auto;text-align:center;padding:24px;">
            <h1 style="font-size:32px;margin:0 0 12px;">Fundraiser not found</h1>
            <a href="/${esc(slug)}" class="btn">Back to hub</a>
          </div>`;
      }
    }

    /* ---------- Start-a-fundraiser modal ---------- */
    function openStartFundraiser(campaignId, campaignTitle) {
      const wrap = document.createElement('div');
      wrap.className = 'modal-backdrop';
      wrap.innerHTML = `
        <div class="modal">
          <h3>Start a fundraiser</h3>
          <p class="muted">Fundraise for <strong>${esc(campaignTitle)}</strong>. Donations go straight to the campaign on GiveSendGo.</p>
          <label>Your name</label>
          <input id="fr-name" />
          <label>Email</label>
          <input id="fr-email" type="email" />
          <label>Your goal (USD, optional)</label>
          <input id="fr-goal" type="number" min="0" />
          <label>Your story</label>
          <textarea id="fr-story" rows="4" placeholder="Why are you fundraising?"></textarea>
          <div class="actions">
            <button class="cancel" type="button">Cancel</button>
            <button class="primary" type="button">Create</button>
          </div>
        </div>`;
      document.body.appendChild(wrap);
      const close = () => wrap.remove();
      wrap.querySelector('.cancel').onclick = close;
      wrap.addEventListener('click', (e) => { if (e.target === wrap) close(); });
      wrap.querySelector('.primary').onclick = async () => {
        const name = wrap.querySelector('#fr-name').value.trim();
        if (!name) return alert('Please enter your name');
        try {
          const r = await fetch(`${API}/api/hub/${encodeURIComponent(slug)}/fundraisers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              campaign_id: campaignId,
              supporter_name: name,
              supporter_email: wrap.querySelector('#fr-email').value.trim() || null,
              goal_amount: parseFloat(wrap.querySelector('#fr-goal').value) || 0,
              story: wrap.querySelector('#fr-story').value.trim() || null,
            }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'Failed');
          close();
          location.href = d.url;
        } catch (e) {
          alert(e.message || 'Failed to create fundraiser');
        }
      };
    }

    /* ---------- Router ---------- */
    if (!slug) {
      renderMarketing();
    } else if (fundraiserSlug) {
      renderFundraiser();
    } else {
      renderHub();
    }
  </script>
</body>
</html>
