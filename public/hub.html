<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GiveHub</title>
  <style>
    :root { --primary: #1a73e8; --secondary: #34a853; --bg: #f7f8fa; --text: #1a202c; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 12px; }
    header img { height: 36px; }
    header h1 { font-size: 18px; margin: 0; }
    .hero { padding: 64px 24px; text-align: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
    .hero h2 { font-size: 40px; margin: 0 0 12px; }
    .hero p { font-size: 18px; opacity: 0.9; }
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    section h3 { font-size: 22px; margin: 32px 0 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; flex-direction: column; }
    .card img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .card h4 { margin: 0 0 8px; font-size: 16px; }
    .card p { font-size: 13px; color: #6b7280; flex: 1; }
    .bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 12px 0 8px; }
    .bar > div { height: 100%; background: var(--primary); }
    .stats { font-size: 12px; color: #6b7280; display: flex; justify-content: space-between; margin-bottom: 12px; }
    .btn { display: inline-block; padding: 10px 16px; background: var(--primary); color: #fff; text-decoration: none; border-radius: 6px; text-align: center; font-weight: 600; }
    .loading { text-align: center; padding: 60px; color: #6b7280; }
    footer { text-align: center; padding: 32px; color: #9ca3af; font-size: 13px; }
  </style>
</head>
<body>
  <div id="app" class="loading">Loading…</div>

  <script>
    const API = location.hostname === 'localhost'
      ? 'http://localhost:8787'
      : 'https://givehub.brieyasmom.workers.dev';

    const slug = location.pathname.split('/').filter(Boolean)[0] || 'demo';

    function money(cents) {
      return '$' + ((cents || 0) / 100).toLocaleString('en-US', { maximumFractionDigits: 0 });
    }

    function card(c, slug) {
      const pct = c.goal_amount ? Math.min(100, Math.round((c.raised_amount / c.goal_amount) * 100)) : 0;
      return `
        <div class="card">
          ${c.image_url ? `<img src="${c.image_url}" alt="">` : `<img alt="">`}
          <div class="card-body">
            <h4>${c.title || ''}</h4>
            <p>${(c.description || '').slice(0, 120)}</p>
            <div class="bar"><div style="width:${pct}%"></div></div>
            <div class="stats"><span>${money(c.raised_amount)}</span><span>${pct}%</span></div>
            <a class="btn" href="${API}/r/${slug}/${c.id}">Donate</a>
          </div>
        </div>`;
    }

    async function load() {
      try {
        const r = await fetch(`${API}/api/hub/${slug}`);
        if (!r.ok) throw new Error('not found');
        const data = await r.json();
        const hub = data.hub || {};
        document.documentElement.style.setProperty('--primary', hub.primary_color || '#1a73e8');
        document.documentElement.style.setProperty('--secondary', hub.secondary_color || '#34a853');
        document.title = data.org.name;

        const featured = data.campaigns.filter(c => c.is_featured);
        const rest = data.campaigns.filter(c => !c.is_featured);

        document.getElementById('app').className = '';
        document.getElementById('app').innerHTML = `
          <header>
            ${hub.logo_url ? `<img src="${hub.logo_url}" alt="">` : ''}
            <h1>${data.org.name}</h1>
          </header>
          <div class="hero">
            <h2>${hub.headline || data.org.name}</h2>
            <p>${hub.tagline || ''}</p>
          </div>
          <main>
            ${featured.length ? `<section><h3>⭐ Featured</h3><div class="grid">${featured.map(c => card(c, slug)).join('')}</div></section>` : ''}
            ${rest.length ? `<section><h3>All Campaigns</h3><div class="grid">${rest.map(c => card(c, slug)).join('')}</div></section>` : ''}
            ${!data.campaigns.length ? '<p style="text-align:center;color:#6b7280">No campaigns yet.</p>' : ''}
          </main>
          <footer>Powered by GiveHub</footer>`;

        // Track page view
        fetch(`${API}/api/hub/${slug}/track`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_type: 'view',
            referrer_url: document.referrer,
            session_id: crypto.randomUUID(),
          }),
        });
      } catch (e) {
        document.getElementById('app').innerHTML = '<p class="loading">Hub not found.</p>';
      }
    }

    load();
  </script>
</body>
</html>
