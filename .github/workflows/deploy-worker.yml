name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Deploy to Cloudflare Workers
        env:
          RAW_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CLOUDFLARE_API_TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')
          CLOUDFLARE_ACCOUNT_ID=$(printf '%s' "$RAW_ACCOUNT" | tr -d '[:space:]')
          export CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID
          npx wrangler deploy
